name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Verify Secrets
        env:
          HOST: ${{ secrets.VPS_HOST }}
          USERNAME: ${{ secrets.VPS_USER }}
          PASSWORD: ${{ secrets.VPS_PASSWORD }}
          KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "HOST=[$HOST]"
          echo "USERNAME=[$USERNAME]"
          echo "HOST length=${#HOST}"
          echo "USERNAME length=${#USERNAME}"
          echo "PASSWORD length=${#PASSWORD}"
          echo "KEY length=${#KEY}"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          debug: true
          script: |
            whoami
            set -e

            cd /var/www/dinesh-seghal-backend/Dinesh-Sagel-Backend

            git fetch --all
            git reset --hard origin/main

            npm install

            pm2 restart dinesh-seghal-backend --update-env

            pm2 save